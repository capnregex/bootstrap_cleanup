    font-family: sans-serif
    "-ms-text-size-adjust": 100%
    "-webkit-text-size-adjust": 100%
- :selector: body
  :properties:
    margin: '0'
- :selector: article, aside, details, figcaption, figure, footer, header, hgroup,
    main, menu, nav, section, summary
  :properties:
    display: block
- :selector: audio, canvas, progress, video
  :properties:
    display: inline-block
    vertical-align: baseline
- :selector: audio:not([controls])
  :properties:
    display: none
    height: '0'
- :selector: "[hidden], template"
  :properties:
    display: none
- :selector: a
  :properties:
    background-color: transparent
- :selector: a:active, a:hover
  :properties:
    outline: '0'
- :selector: abbr[title]
  :properties:
    border-bottom: none
    text-decoration: underline dotted
    "-webkit-text-decoration": underline dotted
    "-moz-text-decoration": underline dotted
- :selector: b, strong
  :properties:
    font-weight: bold
- :selector: dfn
  :properties:
    font-style: italic
- :selector: h1
  :properties:
    font-size: 2em
    margin: 0.67em 0
- :selector: mark
  :properties:
    background: "#ff0"
    color: "#000"
- :selector: small
  :properties:
    font-size: 80%
- :selector: sub, sup
  :properties:
    font-size: 75%
    line-height: '0'
    position: relative
    vertical-align: baseline
- :selector: sup
  :properties:
    top: "-0.5em"
- :selector: sub
  :properties:
    bottom: "-0.25em"
- :selector: img
  :properties:
    border: '0'
- :selector: svg:not(:root)
  :properties:
    overflow: hidden
- :selector: figure
  :properties:
    margin: 1em 40px
- :selector: hr
  :properties:
    "-webkit-box-sizing": content-box
    "-moz-box-sizing": content-box
    box-sizing: content-box
    height: '0'
- :selector: pre
  :properties:
    overflow: auto
- :selector: code, kbd, pre, samp
  :properties:
    font-family: monospace, monospace
    font-size: 1em
- :selector: button, input, optgroup, select, textarea
  :properties:
    color: inherit
    font: inherit
    margin: '0'
- :selector: button
  :properties:
    overflow: visible
- :selector: button, select
  :properties:
    text-transform: none
- :selector: button, html input[type="button"], input[type="reset"], input[type="submit"]
  :properties:
    "-webkit-appearance": button
    cursor: pointer
- :selector: button[disabled], html input[disabled]
  :properties:
    cursor: default
- :selector: button::-moz-focus-inner, input::-moz-focus-inner
  :properties:
    border: '0'
    padding: '0'
- :selector: input
  :properties:
    line-height: normal
- :selector: input[type="checkbox"], input[type="radio"]
  :properties:
    "-webkit-box-sizing": border-box
    "-moz-box-sizing": border-box
    box-sizing: border-box
    padding: '0'
- :selector: input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button
  :properties:
    height: auto
- :selector: input[type="search"]
  :properties:
    "-webkit-appearance": textfield
    "-webkit-box-sizing": content-box
    "-moz-box-sizing": content-box
    box-sizing: content-box
- :selector: input[type="search"]::-webkit-search-cancel-button, input[type="search"]::-webkit-search-decoration
  :properties:
    "-webkit-appearance": none
- :selector: fieldset
  :properties:
    border: '1px solid #c0c0c0'
    margin: 0 2px
    padding: 0.35em 0.625em 0.75em
- :selector: legend
  :properties:
    border: '0'
    padding: '0'
- :selector: textarea
